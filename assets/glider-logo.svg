<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b4dff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0014" stop-opacity="0"/>
    </radialGradient>
    <!-- cloud shape reused per puff, centered ~0,0, width ~100, height ~70 -->
    <clipPath id="rounded-bg">
      <rect width="500" height="500" rx="80"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="500" height="500" rx="80" fill="#0a0014"/>
  <rect width="500" height="500" rx="80" fill="url(#glow)"/>

  <!-- grid lines for hacker feel -->
  <g clip-path="url(#rounded-bg)" stroke="rgba(155,77,255,0.06)" stroke-width="1" fill="none">
    <line x1="167" y1="0" x2="167" y2="500"/>
    <line x1="333" y1="0" x2="333" y2="500"/>
    <line x1="0" y1="125" x2="500" y2="125"/>
    <line x1="0" y1="250" x2="500" y2="250"/>
    <line x1="0" y1="375" x2="500" y2="375"/>
  </g>

  <!--
    Glider pattern (3x3):
      row 0:  . X .
      row 1:  . . X
      row 2:  X X X

    Grid cells: 167x125 each, centered in cell
    Each cloud: ~110w x ~75h
  -->

  <!-- row 0, col 1 — lavender puff -->
  <g transform="translate(250,63)">
    <path d="
      M-10,20
      C-10,20 -45,22 -48,0
      C-51,-22 -30,-38 -15,-35
      C-10,-50 10,-55 25,-42
      C32,-50 52,-38 50,-22
      C58,-15 55,5 45,15
      C50,25 30,28 20,25
      C10,32 -5,28 -10,20
      Z
    " fill="#c77dff" stroke="#e0b0ff" stroke-width="2"/>
    <path d="
      M-15,-30
      C-8,-42 12,-45 22,-35
    " fill="none" stroke="#e0b0ff" stroke-width="2" opacity="0.5"/>
    <ellipse cx="-5" cy="-15" rx="12" ry="8" fill="#e0b0ff" opacity="0.3"/>
  </g>

  <!-- row 1, col 2 — pink puff -->
  <g transform="translate(390,188)">
    <path d="
      M-10,20
      C-10,20 -45,22 -48,0
      C-51,-22 -30,-38 -15,-35
      C-10,-50 10,-55 25,-42
      C32,-50 52,-38 50,-22
      C58,-15 55,5 45,15
      C50,25 30,28 20,25
      C10,32 -5,28 -10,20
      Z
    " fill="#ff6ec7" stroke="#ffb0e0" stroke-width="2"/>
    <path d="
      M-15,-30
      C-8,-42 12,-45 22,-35
    " fill="none" stroke="#ffb0e0" stroke-width="2" opacity="0.5"/>
    <ellipse cx="-5" cy="-15" rx="12" ry="8" fill="#ffb0e0" opacity="0.3"/>
  </g>

  <!-- row 2, col 0 — cyan puff -->
  <g transform="translate(110,313)">
    <path d="
      M-10,20
      C-10,20 -45,22 -48,0
      C-51,-22 -30,-38 -15,-35
      C-10,-50 10,-55 25,-42
      C32,-50 52,-38 50,-22
      C58,-15 55,5 45,15
      C50,25 30,28 20,25
      C10,32 -5,28 -10,20
      Z
    " fill="#4df0ff" stroke="#a0f8ff" stroke-width="2"/>
    <path d="
      M-15,-30
      C-8,-42 12,-45 22,-35
    " fill="none" stroke="#a0f8ff" stroke-width="2" opacity="0.5"/>
    <ellipse cx="-5" cy="-15" rx="12" ry="8" fill="#a0f8ff" opacity="0.3"/>
  </g>

  <!-- row 2, col 1 — purple puff -->
  <g transform="translate(250,313)">
    <path d="
      M-10,20
      C-10,20 -45,22 -48,0
      C-51,-22 -30,-38 -15,-35
      C-10,-50 10,-55 25,-42
      C32,-50 52,-38 50,-22
      C58,-15 55,5 45,15
      C50,25 30,28 20,25
      C10,32 -5,28 -10,20
      Z
    " fill="#9b4dff" stroke="#cfa0ff" stroke-width="2"/>
    <path d="
      M-15,-30
      C-8,-42 12,-45 22,-35
    " fill="none" stroke="#cfa0ff" stroke-width="2" opacity="0.5"/>
    <ellipse cx="-5" cy="-15" rx="12" ry="8" fill="#cfa0ff" opacity="0.3"/>
  </g>

  <!-- row 2, col 2 — yellow puff -->
  <g transform="translate(390,313)">
    <path d="
      M-10,20
      C-10,20 -45,22 -48,0
      C-51,-22 -30,-38 -15,-35
      C-10,-50 10,-55 25,-42
      C32,-50 52,-38 50,-22
      C58,-15 55,5 45,15
      C50,25 30,28 20,25
      C10,32 -5,28 -10,20
      Z
    " fill="#ffe14d" stroke="#fff0a0" stroke-width="2"/>
    <path d="
      M-15,-30
      C-8,-42 12,-45 22,-35
    " fill="none" stroke="#fff0a0" stroke-width="2" opacity="0.5"/>
    <ellipse cx="-5" cy="-15" rx="12" ry="8" fill="#fff0a0" opacity="0.3"/>
  </g>
</svg>
